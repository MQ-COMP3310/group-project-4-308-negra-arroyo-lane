{% extends 'base.html' %}
{% block content %}
<div class="container base-content">
    <div class="row">
        <div class="col text-center">
            <h3>{{ username }}'s Previous Scores</h3>
            {% if scores %}
            <table class="table table-striped table-bordered">
                <thead>
                    <tr>
                        <th>Game</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody>
                    {% for record in scores %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ record.score }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
            {% else %}
            <p>No previous scores recorded.</p>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
