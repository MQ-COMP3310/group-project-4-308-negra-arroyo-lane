{% extends 'base.html' %} {% block content %}
<div class="container base-content">
    <div class="row">
        <div class="col text-center">
            <br>
            <h3 class="text-center">HIGHSCORE BOARD</h3>
            <form method="GET" action="/highscores" style="margin-bottom:15px;">
                <input type="text" name="search" placeholder="Search username..." value="{{ search_term }}"
                    maxlength="30" style="padding:4px 8px; border-radius:4px; border:1px solid #ccc;">
                <button class="btn btn-dark btn-sm">Search</button>
            </form>
            <div class="">
                <table class="table table-striped table-bordered table-hover">
                    <thead class="thead-dark">
                        <tr>
                            <th>Rank</th>
                            <th>Username</th>
                            <th>Score</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if usernames_and_scores %}
                        {% for entry in usernames_and_scores %}
                        <tr>
                            <th scope="row"> {{ loop.index }}</th>
                            <td> {{ entry[0] }} </td>
                            <td> {{ entry[1] }} </td>
                        </tr>
                        {% endfor %}
                        {% else %}
                        <tr>
                            <td colspan="3" class="text-center">No results found.</td>
                        </tr>
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
