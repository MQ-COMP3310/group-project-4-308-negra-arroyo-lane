{% extends 'base.html' %} {% block content %}
<div class="container base-content">
    <div class="row justify-content-center">
        <div class="col text-center">
            <h1>History</h1>
                <!-- Jinja for loop to iterate through the list -->
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Result</th>
                    </tr>
                </thead>

                <tbody>
                    {% for item in results[::-1] %}
                    <tr>
                        <td>{{ loop.index }}</td>
                        <td>{{ item }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
                <form method="get" action="{{ url_for('user', username=username) }}" class="mt-3">
                    <button type="submit" class="btn btn-dark hvr-round-corners">Back</button>
                </form>
            </table>
        </div>
    </div>
</div>
{% endblock %}
