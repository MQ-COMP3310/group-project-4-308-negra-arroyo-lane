<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon.png') }}">

  <meta charset="utf-8">

  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

  <meta name="description" content="Riddle Game">

  <meta name="author" content="Shaun Nugent">

  <title>Riddle Me This</title>

  <!-- Bootstrap core CSS -->
  <link href="{{ url_for('static', filename='vendor/bootstrap/css/bootstrap.min.css') }}" rel="stylesheet">

  <!-- Fontawesome CSS -->
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.1.0/css/all.css" integrity="sha384-lKuwvrZot6UHsBSfcMvOkWwlCMgc0TaWr+30HWe3a4ltaBwTZhyTEggF5tJv8tbt" crossorigin="anonymous">

  <!-- Hover.CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/hover.css/2.3.1/css/hover-min.css" integrity="sha512-uc2hPIzorvbJG6r8Z5KS3OZZmLaXdlVMyXDUKn5dVhqaI1Sg+/3cLfIHpEsRXbAEZeXWvBGCvI+A+mSTg4lfA==" crossorigin="anonymous" />
  
  <!-- Custom styles -->
  <link href="{{ url_for('static', filename='custom/css/styles.css') }}" rel="stylesheet">

</head>

<body style="background-color: {{bg_colour}};">

  <!-- Navigation -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand hvr-grow" href="{{ url_for('index') }}">
          <img src="../static/img/logo_white.png" width="150" height="30" alt="">
        </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarResponsive" aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
      <div class="collapse navbar-collapse" id="navbarResponsive">
        <ul class="navbar-nav ml-auto">
          <li class="nav-item hvr-grow">
            <a class="nav-link" href="{{ url_for('index') }}"><i class="fas fa-dice"></i> New Game</a>
          </li>
          <li class="nav-item hvr-grow">
            <a class="nav-link" href="{{ url_for('highscores') }}"><i class="fas fa-trophy"></i> Highscores</a>
          </li>
          <!-- START STYLING FOR FEATURE 1 | BACKGROUND CHANGE INPUT -->
          <li class="nav-item" style="display:flex; align-items:center; gap:6px; padding: 0 8px;">
           <form method="POST" action="/settings/set_colour" style="display:flex; align-items:center; gap:6px;">
             <span class="nav-link mb-0" style="cursor:default; pointer-events:none;" >Background Colour:</span>
             <input type="text" id="bg_colour" name="bg_colour" placeholder="#hexcode" maxlength="7"
                    style="width:90px; font-size:0.85rem; padding:2px 6px; border-radius:4px; border:none; color:#888;">
             <button class="btn btn-sm btn-outline-light">Set</button>
           </form>
         </li>
          <!-- END STYLING FOR FEATURE 1 | BACKGROUND CHANGE INPUT -->
        </ul>
      </div>
    </div>
  </nav>

  <div class="container" style="margin-top: 80px;">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="alert alert-info mt-3">
          {% for message in messages %}
            <div>{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
  </div>

  <!-- Page Content -->
  {% block content %} {% endblock %}
  <!-- /.container -->

  <!-- Bootstrap core JavaScript -->
  <script src="{{ url_for('static', filename='vendor/jquery/jquery.min.js') }}"></script>
  <script src="{{ url_for('static', filename='vendor/bootstrap/js/bootstrap.bundle.min.js') }}"></script>

</body>

</html>
